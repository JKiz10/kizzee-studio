<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landscaping Demo — Coming Soon | Kizzee Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
            overflow: hidden;
        }
        .grain {
            position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat; background-size: 256px;
        }
        .glow {
            position: absolute; width: 500px; height: 500px; border-radius: 50%;
            background: radial-gradient(circle, rgba(34,197,94,0.12) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.2); } }
        .content { position: relative; z-index: 10; }
        .badge {
            display: inline-block; padding: 6px 18px; border-radius: 50px;
            border: 1px solid rgba(34,197,94,0.4); color: #22c55e;
            font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 2rem;
        }
        h1 {
            font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 6vw, 4.5rem);
            line-height: 1.1; margin-bottom: 1rem;
        }
        h1 span { color: #22c55e; }
        p { color: #888; font-size: 1.1rem; max-width: 440px; margin: 0 auto 2.5rem; line-height: 1.6; }
        .btn {
            display: inline-block; padding: 14px 36px; border-radius: 50px;
            background: #22c55e; color: #0a0a0a; font-weight: 500;
            text-decoration: none; font-size: 0.95rem; transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(34,197,94,0.3); }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div class="glow"></div>
    <div class="content">
        <div class="badge">Landscaping</div>
        <h1>Coming <span>Soon</span></h1>
        <p>A custom-built landscaping website demo is on the way. Clean design, fast load, built to book jobs.</p>
        <a href="../../index.html" class="btn">Back to Portfolio</a>
    </div>
</body>
</html>
